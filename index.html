<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam's Fridge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🧊 Sam's Fridge</h1>
    <p class="subtitle">냉장고 재료로 뭘 만들 수 있을까? / What can I cook with what's left?</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="suggestions">추천 (Suggestions)</button>
    <button class="tab-btn" data-tab="fridge">냉장고 (Fridge)</button>
    <button class="tab-btn" data-tab="recipes">레시피 (Recipes)</button>
  </nav>

  <main>
    <!-- Suggestions -->
    <section id="suggestions" class="tab-panel active">
      <h2>만들 수 있는 요리 (What you can make)</h2>
      <div id="canMakeList" class="recipe-cards"></div>

      <h2>거의 다 있어요 (Almost there)</h2>
      <div id="almostList" class="recipe-cards"></div>
    </section>

    <!-- Fridge -->
    <section id="fridge" class="tab-panel">
      <h2>냉장고 재료 (Fridge Ingredients)</h2>
      <form id="fridgeForm" class="inline-form">
        <input type="text" id="fridgeName" placeholder="재료 이름 / Ingredient name" required>
        <input type="text" id="fridgeQty" placeholder="수량 (예: 2개, 500g) / Quantity">
        <button type="submit">추가 (Add)</button>
      </form>
      <ul id="fridgeList" class="item-list"></ul>
    </section>

    <!-- Recipes -->
    <section id="recipes" class="tab-panel">
      <h2>레시피 (Recipes)</h2>
      <form id="recipeForm" class="recipe-form">
        <input type="text" id="recipeName" placeholder="레시피 이름 / Recipe name" required>
        <div id="recipeIngredientRows" class="ingredient-rows">
          <div class="ingredient-row">
            <input type="text" class="ingName" placeholder="재료 / Ingredient" required>
            <input type="text" class="ingQty" placeholder="수량 (선택) / Qty (optional)">
            <button type="button" class="removeRowBtn" title="삭제">✕</button>
          </div>
        </div>
        <button type="button" id="addIngredientRow">+ 재료 추가 (Add ingredient)</button>
        <button type="submit">레시피 저장 (Save recipe)</button>
      </form>
      <div id="recipeListContainer" class="recipe-cards"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
